<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#040804" />
<title>DTF // TEXT AUTOBATTLER</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="DTF" />
<style>
  :root{
    --black:#040804; --screen:#020402; --panel:#081008; --panel2:#0c160c;
    --green:#33ff66; --dim:#1f8f3c; --bright:#aaffbb; --amber:#ffcc44;
    --cyan:#39d4ff; --red:#ff5566; --magenta:#cc77ff; --line:#0a1a0a;
    --mono:"DejaVu Sans Mono","Consolas","SFMono-Regular",Menlo,monospace;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    background:var(--black); color:var(--green); font-family:var(--mono);
    font-size:15px; overflow-x:hidden;
    background-image:repeating-linear-gradient(0deg,var(--line) 0 1px,transparent 1px 3px);
  }
  body.no-scan::after{display:none;}
  body::after{content:"";position:fixed;inset:0;pointer-events:none;z-index:50;
    background:repeating-linear-gradient(0deg,rgba(10,26,10,.25) 0 1px,transparent 1px 3px);}
  .app{max-width:980px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;}
  .waybar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--panel2);
    border-bottom:1px solid #0c200c;position:sticky;top:0;z-index:40;}
  .ws{width:22px;text-align:center;padding:2px 0;border-radius:4px;color:var(--dim);
    font-weight:bold;background:#0c160c;}
  .ws.on{background:#143014;color:var(--green);}
  .title{margin-left:10px;font-weight:bold;letter-spacing:1px;}
  .spacer{flex:1;}
  .shard{color:var(--amber);font-weight:bold;}
  .combo{color:var(--magenta);font-weight:bold;font-size:13px;min-width:70px;text-align:right;}
  .gear{background:#0c160c;border:1px solid #143014;color:var(--green);border-radius:6px;
    padding:6px 9px;cursor:pointer;font-size:16px;touch-action:manipulation;}
  .gear:active{transform:translateY(1px);}
  .body{flex:1;padding:12px;display:flex;flex-direction:column;gap:12px;position:relative;}
  h1{font-size:26px;color:var(--bright);margin:6px 0;}
  h2{font-size:20px;color:var(--green);margin:4px 0 10px;}
  .muted{color:var(--dim);}
  .robot{white-space:pre;color:var(--green);font-size:11px;line-height:1.05;margin:0;
    background:var(--screen);padding:10px;border:1px solid #0c200c;border-radius:6px;overflow:auto;}
  .row{display:flex;gap:12px;flex-wrap:wrap;}
  .panel{background:var(--panel);border:1px solid #0c200c;border-radius:8px;padding:10px;flex:1;min-width:0;position:relative;}
  .panel.scroller{max-height:42vh;overflow:auto;-webkit-overflow-scrolling:touch;}
  .panel h3{margin:0 0 8px;color:var(--green);font-size:14px;letter-spacing:1px;display:flex;justify-content:space-between;}
  .card{background:var(--screen);border:1px solid #0c200c;border-left:3px solid var(--green);
    border-radius:6px;padding:8px 10px;margin-bottom:8px;position:relative;transition:transform .06s;}
  .card.enemy{border-left-color:var(--red);}
  .card.dead{opacity:.45;filter:grayscale(1);}
  .card .top{display:flex;justify-content:space-between;align-items:baseline;}
  .card .nm{font-weight:bold;}
  .card .sub{color:var(--dim);font-size:12px;}
  .card .stat{color:var(--dim);font-size:11px;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .badges{position:absolute;top:6px;right:8px;display:flex;gap:3px;}
  .badge{font-size:11px;width:18px;height:18px;line-height:18px;text-align:center;border-radius:4px;font-weight:bold;}
  .b-burn{background:#3a1410;color:#ff8844;}
  .b-slow{background:#10243a;color:#7fd0ff;}
  .b-buff{background:#10301a;color:#7fffb0;}
  .b-taunt{background:#2a2410;color:#ffd24a;}
  .hpwrap{height:12px;background:#0a1a0a;border-radius:3px;overflow:hidden;margin-top:6px;}
  .hpbar{height:100%;background:var(--green);width:100%;transition:width .18s linear;}
  .hptxt{font-size:11px;color:var(--bright);text-align:right;margin-top:2px;}
  .log{background:var(--screen);border:1px solid #0c200c;border-radius:6px;padding:10px;
    height:26vh;overflow:auto;font-size:13px;line-height:1.35;}
  .log .crit{color:var(--amber);} .log .bad{color:var(--red);}
  .log .good{color:var(--bright);} .log .sys{color:var(--dim);} .log .loot{color:var(--cyan);}
  .controls{display:flex;flex-direction:column;gap:10px;}
  button.btn{font-family:var(--mono);font-size:15px;font-weight:bold;padding:12px 14px;border-radius:8px;
    border:1px solid #0c200c;background:var(--panel);color:var(--green);cursor:pointer;touch-action:manipulation;}
  button.btn:active{transform:translateY(1px);}
  button.primary{background:var(--green);color:#021104;font-size:18px;}
  button.cyan{background:var(--cyan);color:#04222b;}
  button.magenta{background:var(--magenta);color:#1a0626;}
  button.ghost{background:transparent;}
  button:disabled{opacity:.4;cursor:not-allowed;}
  .auto-row{display:flex;gap:8px;}
  .auto-row .btn{flex:1;font-size:14px;padding:9px;}
  .draft-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;}
  .cls{background:var(--panel);border:1px solid #0c200c;border-radius:8px;padding:10px;cursor:pointer;touch-action:manipulation;}
  .cls.sel{border-color:var(--green);background:#0c1f0c;}
  .cls .cn{font-weight:bold;color:var(--green);}
  .cls .cd{color:var(--dim);font-size:11px;margin-top:4px;line-height:1.3;}
  .banner{margin-top:8px;color:var(--cyan);font-weight:bold;min-height:20px;}
  .shop-row{display:flex;align-items:center;gap:10px;background:var(--panel);
    border:1px solid #0c200c;border-radius:8px;padding:10px;margin-bottom:8px;flex-wrap:wrap;}
  .shop-row .sn{font-weight:bold;min-width:130px;}
  .shop-row .sd{color:var(--dim);font-size:12px;flex:1;min-width:120px;}
  .shop-row .rk{color:var(--magenta);font-size:12px;min-width:54px;}
  .modal-bg{position:fixed;inset:0;background:rgba(2,6,2,.82);display:flex;align-items:center;
    justify-content:center;z-index:60;padding:14px;}
  .modal{background:var(--screen);border:1px solid #143014;border-radius:10px;padding:16px;
    max-width:520px;width:100%;max-height:86vh;overflow:auto;}
  .modal h2{margin-top:0;}
  .opt{display:block;width:100%;text-align:left;margin-bottom:8px;}
  .opt .oa{color:var(--bright);}
  .pill{display:inline-block;background:#0c200c;border:1px solid #143014;border-radius:999px;
    padding:3px 10px;color:var(--dim);font-size:12px;margin:2px 0;}
  .pick-hero{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:6px;}
  .pick-hero select{flex:1;min-width:120px;background:var(--panel);color:var(--green);
    border:1px solid #0c200c;border-radius:6px;padding:8px;font-family:var(--mono);}
  .toast{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);background:#0c200c;
    border:1px solid var(--green);color:var(--green);padding:10px 16px;border-radius:8px;z-index:70;
    font-size:14px;opacity:0;transition:opacity .2s;max-width:90vw;text-align:center;}
  .toast.show{opacity:1;}
  .footer{text-align:center;color:#566;font-family:Segoe UI,Arial,sans-serif;font-size:12px;padding:10px;}
  .footer b{color:#9aa;}
  textarea{width:100%;background:var(--panel);color:var(--green);border:1px solid #0c200c;border-radius:6px;
    padding:8px;font-family:var(--mono);font-size:12px;min-height:70px;}

  /* ===== juice ===== */
  @keyframes shake{10%,90%{transform:translateX(-2px)}20%,80%{transform:translateX(3px)}
    30%,50%,70%{transform:translateX(-5px)}40%,60%{transform:translateX(5px)}}
  .shake{animation:shake .3s;}
  /* ===== hero battle animations ===== */
  @keyframes lungeR{0%{transform:translateX(0)}35%{transform:translateX(13px)}100%{transform:translateX(0)}}
  @keyframes lungeL{0%{transform:translateX(0)}35%{transform:translateX(-13px)}100%{transform:translateX(0)}}
  .card.lungeR{animation:lungeR .22s ease-out;}
  .card.lungeL{animation:lungeL .22s ease-out;}
  @keyframes collapse{0%{transform:scale(1);opacity:1;filter:none}100%{transform:scale(.95);opacity:.45;filter:grayscale(1)}}
  .card.collapse{animation:collapse .42s ease-out forwards;}
  @keyframes lvlup{0%{transform:scale(1)}45%{transform:scale(1.06)}100%{transform:scale(1)}}
  .card.lvlup{animation:lvlup .5s ease-out;}
  @keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-40px) scale(1.3)}}
  .floater{position:absolute;left:50%;top:30%;transform:translateX(-50%);
    font-weight:bold;font-size:16px;pointer-events:none;z-index:30;
    text-shadow:0 0 4px #000;animation:floatUp .7s ease-out forwards;}
  @keyframes critFlash{0%{opacity:.55}100%{opacity:0}}
  .critflash{position:fixed;inset:0;background:var(--amber);opacity:0;z-index:55;pointer-events:none;}
  .critflash.go{animation:critFlash .35s ease-out;}
  @keyframes bannerIn{0%{opacity:0;transform:scale(.7)}20%{opacity:1;transform:scale(1)}80%{opacity:1}100%{opacity:0;transform:scale(1.1)}}
  .wavebanner{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    z-index:58;pointer-events:none;}
  .wavebanner span{font-size:min(18vw,84px);font-weight:bold;color:var(--green);
    text-shadow:0 0 20px var(--green),0 0 40px #0a3;letter-spacing:3px;animation:bannerIn 1.1s ease-out forwards;}
  .combo-pop{position:fixed;top:18%;left:50%;transform:translateX(-50%);z-index:57;pointer-events:none;
    color:var(--magenta);font-weight:bold;font-size:22px;text-shadow:0 0 10px var(--magenta);}
  .spark{position:absolute;width:6px;height:6px;border-radius:50%;background:var(--amber);z-index:29;pointer-events:none;}
  .achv{position:fixed;top:14px;left:50%;transform:translateX(-50%);background:#0c200c;
    border:1px solid var(--magenta);color:var(--magenta);padding:10px 16px;border-radius:8px;z-index:72;
    font-size:14px;opacity:0;transition:opacity .3s, transform .3s;transform:translate(-50%,-20px);text-align:center;}
  .achv.show{opacity:1;transform:translate(-50%,0);}
  .hide{display:none!important;}
  .setting-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #0c200c;}
  .setting-row .lbl{font-weight:bold;}
  .setting-row .desc{color:var(--dim);font-size:11px;}
  .toggle{width:52px;height:28px;border-radius:999px;background:#0c200c;border:1px solid #143014;position:relative;cursor:pointer;touch-action:manipulation;}
  .toggle .knob{position:absolute;top:2px;left:2px;width:22px;height:22px;border-radius:50%;background:var(--dim);transition:left .15s,background .15s;}
  .toggle.on{background:#10301a;}.toggle.on .knob{left:26px;background:var(--green);}
  .seg{display:flex;gap:0;border:1px solid #143014;border-radius:6px;overflow:hidden;}
  .seg button{background:#0c160c;color:var(--dim);border:0;padding:8px 10px;font-family:var(--mono);cursor:pointer;font-size:13px;}
  .seg button.on{background:var(--green);color:#021104;font-weight:bold;}
  .best{color:var(--cyan);font-size:12px;margin-top:4px;}

  @media (prefers-reduced-motion: reduce){ .card,.hpbar,.floater,.wavebanner span,.critflash,.achv,.shake,.lungeR,.lungeL,.collapse,.lvlup{animation:none!important;transition:none!important;} }
  @media (max-width:560px){
    body{font-size:16px;} .log{height:22vh;} .panel.scroller{max-height:36vh;} h1{font-size:22px;}
  }
</style>
</head>
<body>
<div class="app" id="app">
  <div class="waybar">
    <span class="ws" data-ws="1">1</span><span class="ws" data-ws="2">2</span>
    <span class="ws" data-ws="3">3</span><span class="ws" data-ws="4">4</span><span class="ws" data-ws="5">5</span>
    <span class="title">DTF // TEXT AUTOBATTLER</span>
    <span class="spacer"></span>
    <span class="combo" id="comboLbl"></span>
    <span class="shard" id="shardLbl">◈ 0</span>
    <button class="gear" id="gearBtn" title="Settings">⚙</button>
  </div>
  <div class="body" id="body"></div>
  <div class="footer">
    DTF TEXT RPG &nbsp;·&nbsp; <b>roguelite autobattler</b> &nbsp;·&nbsp; meta-shop + auto-battle &nbsp;·&nbsp; <span class="muted">made by Aj · playable on phone & laptop</span>
  </div>
</div>
<div class="toast" id="toast"></div>
<div class="achv" id="achv"></div>
<div class="critflash" id="critflash"></div>
<div class="toast" id="updToast" style="border-color:var(--cyan);color:var(--cyan);display:none;cursor:pointer"></div>
<script src="engine.js"></script>
<script src="ui.js"></script>
<script>
  // ===== PWA: install as phone app + auto-update =====
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("sw.js").catch(function (e) { /* offline ok */ });
    });
    // when a new SW is waiting, tell the user + reload on tap
    navigator.serviceWorker.addEventListener("controllerchange", function () {
      window.location.reload();
    });
    navigator.serviceWorker.ready.then(function (reg) {
      reg.addEventListener("updatefound", function () {
        var nw = reg.installing;
        if (!nw) return;
        nw.addEventListener("statechange", function () {
          if (nw.state === "installed" && navigator.serviceWorker.controller) {
            var t = document.getElementById("updToast");
            t.textContent = "UPDATE READY — tap to reload DTF";
            t.style.display = "block";
            t.onclick = function () { nw.postMessage("skipWaiting"); };
          }
        });
      });
    });
  }
  // iOS install hint (no SW install prompt on Safari iOS)
  if (/iPhone|iPad|iPod/.test(navigator.userAgent) && !window.navigator.standalone) {
    var f = document.querySelector(".footer");
    if (f) f.innerHTML += '<br><span class="muted">on iPhone: tap Share ▸ “Add to Home Screen” to install</span>';
  }
</script>
</body>
</html>
